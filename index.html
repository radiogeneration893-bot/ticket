<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Food Fair – Meat Department</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  /* Force landscape on mobile */
  @media screen and (orientation: portrait) {
    body::before {
      content: 'Please rotate your device to landscape';
      position: fixed; inset: 0; z-index: 9999;
      background: #0d3d17;
      color: white;
      font-size: 1.5rem;
      font-family: sans-serif;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 20px;
    }
    body > * { display: none !important; }
  }
  :root {
    --red: #cc1f1f;
    --dark-red: #8b0000;
    --green: #1a6b2a;
    --gold: #d4a017;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Lato', sans-serif;
    background: #0d3d17;
    display: flex;
    align-items: stretch;
    justify-content: stretch;
    padding: 0;
  }

  .kiosk {
    background: #fff;
    border-radius: 0;
    box-shadow: none;
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-columns: 22vw 1fr;
    grid-template-rows: 1fr auto;
    overflow: hidden;
  }

  /* LEFT PANEL */
  .header {
    grid-column: 1;
    grid-row: 1 / 3;
    background: linear-gradient(180deg, #1a6b2a, #0d3d17);
    padding: 2vh 1.5vw;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 0.4vw;
    background: linear-gradient(180deg, var(--gold), var(--red), var(--gold));
  }

  .logo-circle {
    width: 18vw; height: 18vw;
    border-radius: 50%;
    background: white;
    margin: 0 auto 2vh;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 0.2vw var(--gold), 0 0.5vw 2vw rgba(0,0,0,0.4);
    overflow: hidden;
  }
  .logo-circle img {
    width: 16vw; height: 16vw;
    object-fit: contain;
    object-position: center top;
    margin-top: -3vw;
  }

  .dept-title {
    font-family: 'Oswald', sans-serif;
    color: white; font-size: clamp(1rem, 2vw, 3rem); font-weight: 700;
    letter-spacing: 0.2vw; text-transform: uppercase; line-height: 1.3;
    text-align: center; white-space: nowrap;
  }
  .dept-sub {
    color: var(--gold); font-size: clamp(0.5rem, 0.8vw, 1.2rem); letter-spacing: 0.15vw;
    text-transform: uppercase; margin-top: 1vh; opacity: 0.9; line-height: 1.8;
  }

  /* RIGHT TOP — number display */
  .display-area {
    grid-column: 2;
    grid-row: 1;
    background: #f7f0e6;
    padding: 0;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    border-bottom: none;
    overflow: hidden;
  }

  .serving-label {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(2rem, 8vw, 14rem);
    font-weight: 700;
    letter-spacing: 0.8vw;
    color: var(--dark-red);
    text-transform: uppercase;
    line-height: 1;
    flex-shrink: 0;
    width: 100%;
    text-align: center;
    padding: 1vh 0 0.5vh;
  }

  .serving-langs {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(0.8rem, 1.8vw, 3rem);
    font-weight: 600;
    letter-spacing: 0.3vw;
    color: var(--green);
    text-transform: uppercase;
    line-height: 1;
    white-space: nowrap;
    flex-shrink: 0;
    width: 100%;
    text-align: center;
    padding: 0.5vh 0 1vh;
  }

  .big-number {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    color: var(--dark-red);
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    text-shadow: 0.3vw 0.3vw 0 rgba(0,0,0,0.08);
    transition: transform 0.25s ease, color 0.25s ease;
    width: 100%;
    flex: 1;
    font-size: clamp(8rem, min(58vw, 65vh), 120rem);
    letter-spacing: -0.02em;
    padding: 0;
    transform-origin: center;
  }
  .big-number.pop { transform: scale(1.12); color: var(--green); }  /* RIGHT BOTTOM — controls */
  .controls {
    grid-column: 2;
    grid-row: 2;
    padding: 1.2vh 2vw 1.5vh;
    background: white;
    display: flex;
    flex-direction: column;
    gap: 0.8vh;
  }

  .status {
    text-align: center; font-size: clamp(0.6rem, 0.8vw, 1rem); font-weight: 700;
    color: var(--green); letter-spacing: 1.5px; text-transform: uppercase;
    height: 1.6vh;
  }

  .top-row {
    display: flex;
    gap: 1vw;
    align-items: center;
    justify-content: center;
  }

  .next-row {
    display: flex;
    justify-content: center;
  }

  .btn-next {
    padding: 1.2vh 6vw;
    background: linear-gradient(135deg, var(--red), var(--dark-red));
    color: white; font-family: 'Oswald', sans-serif;
    font-size: clamp(1rem, 2vw, 2.5rem); font-weight: 700; letter-spacing: 0.3vw;
    text-transform: uppercase; border: none; border-radius: 0.8vw;
    cursor: pointer; box-shadow: 0 0.3vh 1.5vh rgba(180,0,0,0.4);
    transition: all 0.15s; white-space: nowrap;
  }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 0.5vh 2vh rgba(180,0,0,0.5); }
  .btn-next:active { transform: scale(0.98); }

  .btn-sm {
    padding: 0.9vh 1.2vw; font-family: 'Oswald', sans-serif;
    font-size: clamp(0.6rem, 1vw, 1.2rem); letter-spacing: 0.15vw; text-transform: uppercase;
    border: none; border-radius: 0.6vw; cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-prev   { background: #3a6ea8; color: white; }
  .btn-prev:hover   { background: #2a5080; }
  .btn-repeat { background: var(--green); color: white; }
  .btn-repeat:hover { background: #145220; }
  .btn-reset  { background: #555; color: white; }
  .btn-reset:hover  { background: #222; }

  .set-input {
    padding: 0.8vh 1vw; border: 2px solid #ddd;
    border-radius: 0.6vw; font-family: 'Oswald', sans-serif;
    font-size: clamp(0.8rem, 1vw, 1.5rem); text-align: center; outline: none;
    transition: border-color 0.2s; width: 8vw;
  }
  .set-input:focus { border-color: var(--red); }
  .set-input::placeholder { font-size: 0.75rem; color: #aaa; }

  .btn-set {
    padding: 0.8vh 1.2vw; background: var(--gold); color: #222;
    font-family: 'Oswald', sans-serif; font-size: clamp(0.6rem, 1vw, 1.2rem); font-weight: 700;
    letter-spacing: 0.15vw; text-transform: uppercase; border: none;
    border-radius: 0.6vw; cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .btn-set:hover { background: #b8860b; color: white; }
</style>
</head>

    <div class="dept-title">MEAT DEPARTMENT</div>
    <div class="dept-sub">Departamento de Carnes &nbsp;•&nbsp; Depatman Vyann</div>
  </div>

  <div class="display-area">
    <div class="serving-label">NOW SERVING</div>
    <div class="big-number" id="numDisplay">---</div>
    <div class="serving-langs">AHORA SIRVIENDO &nbsp;•&nbsp; KOUNYE A NAP SEVI NUMERO</div>
  </div>

  <div class="controls">
    <div class="status" id="statusMsg">&nbsp;</div>

    <div class="next-row">
      <button class="btn-next" onclick="nextTicket()">▶ Next Customer</button>
    </div>

    <div class="top-row">
      <button class="btn-sm btn-prev"   onclick="prevTicket()">◀ Previous</button>
      <button class="btn-sm btn-repeat" onclick="repeatAnnounce()">🔊 Repeat</button>
      <button class="btn-sm btn-reset"  onclick="resetCounter()">↺ Reset</button>
      <input type="number" class="set-input" id="customInput" placeholder="Start #" min="1" max="999">
      <button class="btn-set" onclick="setNumber()">Set #</button>
    </div>
  </div>

</div>

<script>
  let current = 0, started = false;

  // Firebase setup
  const firebaseConfig = {
    apiKey: "AIzaSyBDi6oEKmZ6B6r9_wPk8nMIzr23hEX-5Y8",
    authDomain: "foodfair-meat.firebaseapp.com",
    databaseURL: "https://foodfair-meat-default-rtdb.firebaseio.com",
    projectId: "foodfair-meat",
    storageBucket: "foodfair-meat.firebasestorage.app",
    messagingSenderId: "183879584210",
    appId: "1:183879584210:web:52daf9dac7e40f8dd9a00b",
    measurementId: "G-7XZ2DWHFN9"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function syncNowServing(numStr) {
    db.ref('meat/current').set({ number: numStr, updated: Date.now() });
  }

  const onesEN = ['','one','two','three','four','five','six','seven','eight','nine',
    'ten','eleven','twelve','thirteen','fourteen','fifteen','sixteen','seventeen','eighteen','nineteen'];
  const tensEN = ['','','twenty','thirty','forty','fifty','sixty','seventy','eighty','ninety'];
  function wordsEN(n) {
    if (n < 20) return onesEN[n];
    if (n < 100) return tensEN[Math.floor(n/10)] + (n%10 ? ' '+onesEN[n%10] : '');
    return onesEN[Math.floor(n/100)] + ' hundred' + (n%100 ? ' '+wordsEN(n%100) : '');
  }

  const onesES = ['','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve',
    'diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve'];
  const tensES = ['','','veinte','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
  const v20 = {21:'veintiuno',22:'veintidós',23:'veintitrés',24:'veinticuatro',
    25:'veinticinco',26:'veintiséis',27:'veintisiete',28:'veintiocho',29:'veintinueve'};
  function wordsES(n) {
    if (n < 20) return onesES[n];
    if (v20[n]) return v20[n];
    if (n < 100) return tensES[Math.floor(n/10)] + (n%10 ? ' y '+onesES[n%10] : '');
    if (n===100) return 'cien';
    const hw = ['','ciento','doscientos','trescientos','cuatrocientos','quinientos',
                'seiscientos','setecientos','ochocientos','novecientos'];
    return hw[Math.floor(n/100)] + (n%100 ? ' '+wordsES(n%100) : '');
  }

  const onesHT = ['','en','de','twa','kat','senk','sis','sèt','uit','nèf',
    'dis','onz','douz','trèz','katòz','kenz','sèz','disèt','dizuit','diznèf'];
  const tensHT = ['','','ven','trant','karant','senkant','swasant','swasanndis','katreven','katrevendis'];
  function wordsHT(n) {
    if (n < 20) return onesHT[n];
    if (n < 100) return tensHT[Math.floor(n/10)] + (n%10 ? ' '+onesHT[n%10] : '');
    return onesHT[Math.floor(n/100)] + ' san' + (n%100 ? ' '+wordsHT(n%100) : '');
  }

  const phrases = [
    n => ({ text: `Now serving number ${wordsEN(n)}.`,        code: 'en', lang: 'en-US' }),
    n => ({ text: `Ahora sirviendo el número ${wordsES(n)}.`, code: 'es', lang: 'es-ES' }),
    n => ({ text: `Kounye a nap sevi numero ${wordsHT(n)}.`,  code: 'fr', lang: 'fr-FR' }),
  ];

  // Load voices - handles iOS async loading
  let cachedVoices = [];
  function loadVoices() {
    cachedVoices = speechSynthesis.getVoices();
    if (!cachedVoices.length) {
      speechSynthesis.onvoiceschanged = () => { cachedVoices = speechSynthesis.getVoices(); };
      setTimeout(() => { cachedVoices = speechSynthesis.getVoices(); }, 2000);
    }
  }
  loadVoices();

  // Native female voice per language for correct pronunciation
  const voicePrefs = {
    'en': ['Samantha','Karen','Moira','Tessa','Victoria','Google US English','Microsoft Zira','en-US','en-GB','en'],
    'es': ['Paulina','Mónica','Google español de Estados Unidos','Google español','Microsoft Helena','Microsoft Laura','es-MX','es-ES','es-US','es'],
    'fr': ['Amelie','Audrey','Google français','Microsoft Julie','Microsoft Hortense','fr-FR','fr-CA','fr'],
  };

  function getBestVoice(code) {
    const voices = cachedVoices.length ? cachedVoices : speechSynthesis.getVoices();
    const prefs = voicePrefs[code] || [];
    for (const p of prefs) {
      const v = voices.find(v => v.name === p); if (v) return v;
    }
    for (const p of prefs) {
      const v = voices.find(v => v.name.includes(p)); if (v) return v;
    }
    for (const p of prefs) {
      const v = voices.find(v => v.lang === p || v.lang.startsWith(p)); if (v) return v;
    }
    return null;
  }

  function speakOne(text, code, lang, onDone) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = 0.80; u.pitch = 1; u.volume = 1;
    const voice = getBestVoice(code);
    if (voice) u.voice = voice;
    u.onend = onDone;
    u.onerror = onDone;
    speechSynthesis.speak(u);
  }

  function speakSequence(n, idx=0) {
    if (!window.speechSynthesis || idx >= phrases.length) return;
    const { text, code, lang } = phrases[idx](n);
    speakOne(text, code, lang, () => speakSequence(n, idx+1));
  }

  function announceAll(n) {
    if (!window.speechSynthesis) { showStatus('⚠ Audio not supported'); return; }
    speechSynthesis.cancel();
    cachedVoices = speechSynthesis.getVoices();
    setTimeout(() => speakSequence(n), 300);
  }

  function flash() {
    const el = document.getElementById('numDisplay');
    el.classList.add('pop');
    setTimeout(() => el.classList.remove('pop'), 350);
  }

  function showStatus(msg) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    clearTimeout(el._t);
    el._t = setTimeout(() => el.textContent = '\u00a0', 3800);
  }

  function pad(n) { return String(n).padStart(3,'0'); }

  function nextTicket() {
    if (!started) { started = true; if (current === 0) current = 1; }
    else current++;
    if (current > 999) current = 1;
    document.getElementById('numDisplay').textContent = pad(current);
    flash(); announceAll(current);
    showStatus('🔔 Calling number ' + pad(current));
    syncNowServing(pad(current));
  }

  function prevTicket() {
    if (!started || current <= 1) { showStatus('Already at the beginning'); return; }
    current--;
    document.getElementById('numDisplay').textContent = pad(current);
    flash(); announceAll(current);
    showStatus('◀ Back to number ' + pad(current));
    syncNowServing(pad(current));
  }

  function repeatAnnounce() {
    if (!started) { showStatus('Press Next Customer first'); return; }
    announceAll(current);
    showStatus('🔊 Repeating number ' + pad(current));
  }

  function resetCounter() {
    current = 0; started = false;
    document.getElementById('numDisplay').textContent = '---';
    document.getElementById('customInput').value = '';
    speechSynthesis && speechSynthesis.cancel();
    showStatus('Counter reset');
  }

  function setNumber() {
    const v = parseInt(document.getElementById('customInput').value);
    if (isNaN(v) || v < 1 || v > 999) { showStatus('⚠ Enter 1–999'); return; }
    current = v - 1; started = false;
    document.getElementById('numDisplay').textContent = pad(v);
    document.getElementById('customInput').value = '';
    showStatus('✓ Will start at ' + pad(v) + ' — press Next Customer');
  }

  if (window.speechSynthesis) {
    speechSynthesis.getVoices();
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  }

  // Click anywhere on screen = Next Customer, except excluded controls
  document.addEventListener('click', function(e) {
    const excluded = e.target.closest(
      '.btn-prev, .btn-repeat, .btn-reset, .btn-set, .set-input, #customInput'
    );
    if (!excluded) nextTicket();
  });
</script>
